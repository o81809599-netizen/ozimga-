<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odilxon - Premium Randomizer Baraban</title>
    <!-- Google SEO uchun maxsus teglar -->
    <meta name="description" content="Odilxon - Instagram, Telegram va TikTok uchun eng zo'r tasodifiy g'olibni aniqlash (Randomizer Baraban) xizmati.">
    <meta name="keywords" content="odilxon, oodilxon, random, baraban, g'olibni aniqlash, randomizer, instagram g'olib, tiktok random">
    <meta name="author" content="Odilxon">
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="background-animation">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
    </div>

    <div class="container">
        <!-- Header -->
        <header class="glass-panel text-center">
            <h1>🏆 Premium Randomizer</h1>
            <p>Instagram, Telegram yoki TikTok havolasini kiriting va g'olibni aniqlang!</p>
            <div class="input-group">
                <input type="text" id="postUrl" placeholder="https://instagram.com/p/..." autocomplete="off">
                <button id="fetchBtn" class="btn primary-btn">Izohlarni olish</button>
            </div>
        </header>

        <div class="main-content">
            <!-- Comments Section -->
            <aside class="comments-section glass-panel">
                <h2>💬 Izohlar (<span id="commentCount">0</span>)</h2>
                <div class="loading-state hidden" id="loadingState">
                    <div class="spinner"></div>
                    <p>Izohlar yuklanmoqda...</p>
                </div>
                <div class="comments-list" id="commentsList">
                    <div class="empty-state">
                        Havolani kiriting va "Izohlarni olish" tugmasini bosing
                    </div>
                </div>
            </aside>

            <!-- Wheel Section -->
            <section class="wheel-section glass-panel">
                <div class="wheel-header text-center" style="position: absolute; top: 20px; width: 100%; z-index: 10;">
                    <h2 style="font-size: 1.5rem; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.5);">Videoda jami <span id="videoCommentCount" style="color: #fbbf24; font-size: 2rem;">0</span> ta izoh qoldirilgan</h2>
                </div>
                <div class="wheel-container" style="margin-top: 60px;">
                    <div class="wheel-pointer">▼</div>
                    <canvas id="wheelCanvas" width="500" height="500"></canvas>
                    <button id="spinBtn" class="spin-btn" disabled>SPIN</button>
                </div>
            </section>
        </div>
    </div>

    <!-- Winner Modal -->
    <div class="modal-overlay hidden" id="winnerModal">
        <div class="modal-content glass-panel">
            <h2 style="font-size: 2rem; color: #fbbf24; margin-bottom: 10px;">🎉 G'olib aniqlandi! 🎉</h2>
            <div class="winner-info" style="padding: 2rem; background: rgba(0,0,0,0.4); border-radius: 15px;">
                <div class="winner-avatar" id="winnerAvatar" style="margin-bottom: 15px;"></div>
                <h3 id="winnerName" style="font-size: 1.8rem; margin-bottom: 10px; color: #a855f7;">@username</h3>
                <p style="color: #94a3b8; font-size: 1rem; margin-bottom: 5px;">Yozgan izohi:</p>
                <p class="winner-comment" id="winnerComment" style="font-size: 1.4rem; font-weight: bold; color: #fff;">"..."</p>
            </div>
            <button id="closeModalBtn" class="btn primary-btn mt-4">Yopish</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
